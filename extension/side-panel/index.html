<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel" id="panel">

    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M6.5 1L10.5 3.5V9.5L6.5 12L2.5 9.5V3.5L6.5 1Z" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.1"/>
              <circle cx="6.5" cy="6.5" r="1.8" fill="currentColor"/>
            </svg>
          </div>
          <span class="logo-text">Cloudly</span>
        </div>
        <button class="inspector-btn" id="inspectorBtn" title="Pick element to inject">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="5" cy="5" r="3.2" stroke="currentColor" stroke-width="1.2"/>
            <line x1="7.3" y1="7.3" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Pick</span>
        </button>
      </div>

      <div class="search-row">
        <div class="search-bar">
          <svg class="search-icon" width="11" height="11" viewBox="0 0 11 11" fill="none">
            <circle cx="4.5" cy="4.5" r="3.2" stroke="currentColor" stroke-width="1.2"/>
            <line x1="7" y1="7" x2="10.5" y2="10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search…">
        </div>
        <div class="domain-pill" id="domainPill">
          <span class="domain-dot"></span>
          <span id="domainText">all</span>
          <button class="domain-clear" id="domainClear" title="Clear filter">×</button>
        </div>
      </div>

      <!-- Back navigation + domain permissions — only visible in file view -->
      <div class="nav-row" id="navRow">
        <button class="back-btn" id="backBtn" title="Back to folders">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <polyline points="9,3 5,7 9,11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="nav-folder-name" id="navFolderName"></span>
        <div class="nav-domain-chips" id="navDomainChips"></div>
        <button class="nav-domain-add" id="navDomainAdd" style="display:none"></button>
      </div>

      <!-- Only visible in file view -->
      <div class="size-filter" id="sizeFilter">
        <button class="size-btn active" data-size="all">All</button>
        <button class="size-btn" data-size="small">Under 10 MB</button>
        <button class="size-btn" data-size="large">Over 10 MB</button>
      </div>
    </header>

    <div class="send-bar" id="sendBar" style="display:none">
      <div class="send-bar-dot"></div>
      <span class="send-bar-text">Click a file to inject</span>
      <button class="send-bar-cancel" id="sendCancel">Cancel</button>
    </div>

    <main class="main" id="main">

      <!-- ROOT VIEW: folder tree -->
      <div class="folder-view" id="folderView">
        <div class="folder-list" id="folderList"></div>
        <button class="new-folder-btn" id="newFolderBtn">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <line x1="5" y1="1" x2="5" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="1" y1="5" x2="9" y2="5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          New folder
        </button>
      </div>

      <!-- FILE VIEW: grid inside folder -->
      <div class="file-view" id="fileView">
        <div class="tag-bar" id="tagBar">
          <div class="tag-chips" id="tagChips"></div>
          <button class="tag-add-btn" id="tagAddBtn" title="New tag">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
              <line x1="4.5" y1="1" x2="4.5" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="1" y1="4.5" x2="8" y2="4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="file-grid" id="fileGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" class="empty-icon-svg">
            <rect x="7" y="10" width="22" height="20" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 10V8a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M19 10V8a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="24" y2="17" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="12" y1="21" x2="19" y2="21" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <p class="empty-title">No files here</p>
          <p class="empty-sub">Upload to get started</p>
        </div>
        <div class="loading-state" id="loadingState" style="display:none">
          <div class="spinner"></div>
        </div>
      </div>

    </main>

    <footer class="footer">
      <div class="storage-bar">
        <div class="storage-info">
          <span id="storageUsed">0 B</span>
          <span class="storage-label">used</span>
        </div>
        <div class="storage-track">
          <div class="storage-fill" id="storageFill"></div>
        </div>
      </div>
      <label class="upload-btn" title="Upload files">
        <input type="file" id="fileInput" multiple style="display:none">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <line x1="6" y1="1" x2="6" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <polyline points="2.5,4 6,1 9.5,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="1" y1="11" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Upload
      </label>
    </footer>

    <div class="preview-overlay" id="previewOverlay" style="display:none">
      <div class="preview-backdrop" id="previewBackdrop"></div>
      <div class="preview-modal">
        <button class="preview-close" id="previewClose">×</button>
        <div class="preview-content" id="previewContent"></div>
        <div class="preview-title" id="previewTitle"></div>
      </div>
    </div>

    <div class="caption-overlay" id="captionOverlay" style="display:none">
      <div class="caption-backdrop" id="captionBackdrop"></div>
      <div class="caption-modal">
        <button class="caption-close" id="captionClose">×</button>
        <div class="caption-preview-wrap">
          <img class="caption-preview-img" id="captionPreviewImg" src="" alt="">
          <div class="caption-preview-text" id="captionPreviewText"></div>
        </div>
        <div class="caption-controls">
          <input type="text" class="caption-text-input" id="captionTextInput" placeholder="Add caption…" maxlength="80" autocomplete="off">
          <div class="caption-row">
            <span class="caption-label">Style</span>
            <div class="caption-styles" id="captionStyles">
              <button class="caption-style-btn active" data-style="classic">Classic</button>
              <button class="caption-style-btn" data-style="bold">Bold</button>
              <button class="caption-style-btn" data-style="neon">Neon</button>
              <button class="caption-style-btn" data-style="typewriter">Mono</button>
              <button class="caption-style-btn" data-style="clean">Clean</button>
            </div>
          </div>
          <div class="caption-row">
            <span class="caption-label">Position</span>
            <div class="caption-positions" id="captionPositions">
              <button class="caption-pos-btn" data-pos="top">Top</button>
              <button class="caption-pos-btn" data-pos="center">Center</button>
              <button class="caption-pos-btn active" data-pos="bottom">Bottom</button>
            </div>
          </div>
          <button class="caption-save-btn" id="captionSaveBtn">Save as new GIF</button>
        </div>
      </div>
    </div>

    <div class="inspector-overlay" id="inspectorOverlay" style="display:none">
      <div class="inspector-toast">
        <div class="inspector-pulse"></div>
        <span>Hover & click an element</span>
        <button class="inspector-cancel" id="inspectorCancel">cancel</button>
      </div>
    </div>

  </div>
  <script src="panel.js"></script>
</body>
</html>
